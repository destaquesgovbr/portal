union AgentEvent =
  | AgentEventThinking
  | AgentEventToolCall
  | AgentEventToolResult
  | AgentEventSampleResult
  | AgentEventAdjusting
  | AgentEventDone
  | AgentEventError

type AgentEventAdjusting {
  message: String!
}

type AgentEventDone {
  recortes: [Recorte!]!
  explanation: String!
  description: String!
  suggestedName: String!
  iterations: Int!
  converged: Boolean!
}

type AgentEventError {
  message: String!
}

type AgentEventSampleResult {
  payloadJson: String!
}

type AgentEventThinking {
  message: String!
}

type AgentEventToolCall {
  tool: String!
  argsJson: String!
}

type AgentEventToolResult {
  tool: String!
  resultJson: String!
}

